<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아티클 공부 — 수헌의 경제 공부</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0e8;
      --paper: #fdfaf4;
      --ink: #1a1a18;
      --ink-light: #5a5a52;
      --accent: #c8401a;
      --accent-light: #f0d5cc;
      --border: #d4ccbc;
      --tag-bg: #e8e2d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--ink); font-family: 'Noto Serif KR', serif; min-height: 100vh; }

    #lock-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; flex-direction: column; gap: 2rem;
    }
    #lock-screen h1 { font-size: 1.4rem; letter-spacing: 0.08em; color: var(--ink-light); font-weight: 400; }
    .lock-box { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }
    #lock-screen input {
      border: 1.5px solid var(--border); background: var(--paper);
      padding: 0.75rem 1.2rem; font-size: 1rem; font-family: 'DM Mono', monospace;
      outline: none; width: 220px; text-align: center; letter-spacing: 0.2em; color: var(--ink); border-radius: 2px;
    }
    #lock-screen input:focus { border-color: var(--accent); }
    #lock-screen button {
      background: var(--accent); color: #fff; border: none;
      padding: 0.65rem 2rem; font-size: 0.9rem; cursor: pointer;
      font-family: 'Noto Serif KR', serif; border-radius: 2px; width: 220px;
    }
    #lock-screen button:hover { background: #a83315; }
    #lock-error { color: var(--accent); font-size: 0.8rem; font-family: 'DM Mono', monospace; min-height: 1rem; }

    #app { display: none; }

    header {
      border-bottom: 1.5px solid var(--border); padding: 1.2rem 2rem;
      background: var(--paper); position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 1rem;
    }
    .back-btn {
      font-family: 'DM Mono', monospace; font-size: 0.75rem;
      color: var(--ink-light); text-decoration: none;
      border: 1px solid var(--border); padding: 0.3rem 0.7rem; border-radius: 2px;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header h1 span { color: var(--accent); }

    .container { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem; }

    .form-section { background: var(--paper); border: 1.5px solid var(--border); padding: 1.8rem; margin-bottom: 2.5rem; }
    .form-section h2 { font-size: 0.8rem; font-family: 'DM Mono', monospace; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 1.4rem; text-transform: uppercase; }
    .form-grid { display: grid; gap: 1rem; }
    .form-row { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.75rem; font-family: 'DM Mono', monospace; color: var(--ink-light); letter-spacing: 0.05em; }
    input[type="date"], input[type="text"], textarea {
      border: 1.5px solid var(--border); background: var(--bg);
      padding: 0.6rem 0.9rem; font-size: 0.9rem; font-family: 'Noto Serif KR', serif;
      color: var(--ink); outline: none; width: 100%; border-radius: 2px; resize: vertical;
    }
    input:focus, textarea:focus { border-color: var(--accent); background: var(--paper); }
    textarea { min-height: 90px; line-height: 1.7; }
    textarea.tall { min-height: 130px; }
    .form-actions { display: flex; justify-content: flex-end; gap: 0.7rem; margin-top: 1.2rem; }
    .btn { padding: 0.6rem 1.4rem; font-size: 0.85rem; font-family: 'Noto Serif KR', serif; cursor: pointer; border-radius: 2px; border: 1.5px solid transparent; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #a83315; }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--ink-light); }
    .btn-ghost:hover { border-color: var(--ink-light); color: var(--ink); }

    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
    .list-header h2 { font-size: 0.8rem; font-family: 'DM Mono', monospace; letter-spacing: 0.12em; color: var(--ink-light); text-transform: uppercase; }
    .count-badge { font-family: 'DM Mono', monospace; font-size: 0.7rem; background: var(--tag-bg); color: var(--ink-light); padding: 0.2rem 0.6rem; border-radius: 20px; }
    .card-list { display: flex; flex-direction: column; gap: 1rem; }

    .card { background: var(--paper); border: 1.5px solid var(--border); padding: 1.4rem 1.6rem; cursor: pointer; transition: border-color 0.15s; }
    .card:hover { border-color: var(--accent); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
    .card-date { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--accent); letter-spacing: 0.05em; }
    .card-actions { display: flex; gap: 0.5rem; }
    .card-actions button { background: none; border: none; cursor: pointer; font-size: 0.75rem; font-family: 'DM Mono', monospace; color: var(--ink-light); padding: 0.15rem 0.4rem; }
    .card-actions button:hover { color: var(--accent); }
    .card-article { font-size: 0.88rem; line-height: 1.75; color: var(--ink); margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card.expanded .card-article { display: block; -webkit-line-clamp: unset; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.6rem; }
    .tag { font-family: 'DM Mono', monospace; font-size: 0.68rem; background: var(--accent-light); color: var(--accent); padding: 0.15rem 0.55rem; border-radius: 20px; }
    .card-meta { display: none; margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem; gap: 0.8rem; flex-direction: column; }
    .card.expanded .card-meta { display: flex; }
    .meta-item label { font-size: 0.68rem; font-family: 'DM Mono', monospace; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 0.3rem; }
    .meta-item p { font-size: 0.85rem; line-height: 1.7; color: var(--ink); }
    .meta-item a { color: var(--accent); font-size: 0.8rem; font-family: 'DM Mono', monospace; word-break: break-all; }
    .empty-state { text-align: center; padding: 3rem; color: var(--ink-light); font-size: 0.9rem; border: 1.5px dashed var(--border); }

    @media (max-width: 600px) {
      header { padding: 1rem 1.2rem; }
      .container { padding: 1.2rem 1rem; }
      .form-section { padding: 1.2rem; }
      .card { padding: 1rem 1.1rem; }
    }
  </style>
</head>
<body>

<div id="lock-screen">
  <h1>🔒 경제 공부 아카이브</h1>
  <div class="lock-box">
    <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()" />
    <div id="lock-error"></div>
    <button onclick="checkPw()">입장</button>
  </div>
</div>

<div id="app">
  <header>
    <a href="index.html" class="back-btn">← 홈</a>
    <h1>📰 <span>아티클 공부</span></h1>
  </header>

  <div class="container">
    <div class="form-section">
      <h2>— 새 아티클 기록</h2>
      <div class="form-grid">
        <div class="form-row">
          <label>날짜</label>
          <input type="date" id="f-date" />
        </div>
        <div class="form-row">
          <label>아티클 원문 (카톡 복붙)</label>
          <textarea id="f-article" class="tall" placeholder="여기에 붙여넣기..."></textarea>
        </div>
        <div class="form-row">
          <label>몰랐던 개념</label>
          <textarea id="f-concept" placeholder="새로 알게 된 단어나 개념..."></textarea>
        </div>
        <div class="form-row">
          <label>내 생각</label>
          <textarea id="f-thought" placeholder="읽고 나서 든 생각..."></textarea>
        </div>
        <div class="form-row">
          <label>참고 소스 (링크 or 출처)</label>
          <input type="text" id="f-source" placeholder="https://..." />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="clearForm()">초기화</button>
        <button class="btn btn-primary" onclick="saveEntry()">저장</button>
      </div>
    </div>

    <div class="list-header">
      <h2>— 아카이브</h2>
      <span class="count-badge" id="count-badge">0개</span>
    </div>
    <div class="card-list" id="card-list"></div>
  </div>
</div>

<script>
  const PW = "econ1234";

  function checkPw() {
    if (document.getElementById('pw-input').value === PW) {
      sessionStorage.setItem('auth', 'ok');
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      init();
    } else {
      document.getElementById('lock-error').textContent = '비밀번호가 틀렸어요';
      document.getElementById('pw-input').value = '';
    }
  }

  if (sessionStorage.getItem('auth') === 'ok') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  }

  function getEntries() { return JSON.parse(localStorage.getItem('econ_articles') || '[]'); }
  function saveEntries(arr) { localStorage.setItem('econ_articles', JSON.stringify(arr)); }

  function saveEntry() {
    const date = document.getElementById('f-date').value;
    const article = document.getElementById('f-article').value.trim();
    if (!date || !article) { alert('날짜와 아티클 원문은 필수예요!'); return; }
    const entry = {
      id: Date.now(), date, article,
      concept: document.getElementById('f-concept').value.trim(),
      thought: document.getElementById('f-thought').value.trim(),
      source: document.getElementById('f-source').value.trim(),
    };
    const entries = getEntries();
    entries.unshift(entry);
    saveEntries(entries);
    clearForm();
    renderCards();
  }

  function clearForm() {
    ['f-article','f-concept','f-thought','f-source'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  }

  function deleteEntry(id) {
    if (!confirm('삭제할까요?')) return;
    saveEntries(getEntries().filter(e => e.id !== id));
    renderCards();
  }

  function toggleCard(id) {
    const card = document.getElementById('card-' + id);
    const btn = card.querySelector('.toggle-btn');
    card.classList.toggle('expanded');
    btn.textContent = card.classList.contains('expanded') ? '접기 ▴' : '펼치기 ▾';
  }

  function renderCards() {
    const entries = getEntries();
    document.getElementById('count-badge').textContent = entries.length + '개';
    const list = document.getElementById('card-list');
    if (entries.length === 0) {
      list.innerHTML = '<div class="empty-state">아직 기록이 없어요.<br>첫 번째 아티클을 추가해봐요!</div>';
      return;
    }
    list.innerHTML = entries.map(e => `
      <div class="card" id="card-${e.id}">
        <div class="card-top">
          <span class="card-date">${e.date}</span>
          <div class="card-actions">
            <button class="toggle-btn" onclick="toggleCard(${e.id})">펼치기 ▾</button>
            <button onclick="deleteEntry(${e.id})">삭제</button>
          </div>
        </div>
        <div class="card-article">${escHtml(e.article)}</div>
        ${e.concept ? `<div class="card-tags"><span class="tag">${escHtml(e.concept.slice(0,30))}${e.concept.length>30?'…':''}</span></div>` : ''}
        <div class="card-meta">
          ${e.concept ? `<div class="meta-item"><label>몰랐던 개념</label><p>${escHtml(e.concept)}</p></div>` : ''}
          ${e.thought ? `<div class="meta-item"><label>내 생각</label><p>${escHtml(e.thought)}</p></div>` : ''}
          ${e.source ? `<div class="meta-item"><label>출처</label><a href="${escHtml(e.source)}" target="_blank">${escHtml(e.source)}</a></div>` : ''}
        </div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  function init() { clearForm(); renderCards(); }
</script>
</body>
</html>
