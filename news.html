<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Reading — 수헌의 경제 공부</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    @font-face { font-family: 'Neuropol'; src: url('fonts/neuropol_x_free.ttf') format('truetype'); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #a8d8f0 0%, #c8ecd4 30%, #a0d4f0 55%, #b8e8c8 80%, #90c8e8 100%); background-attachment: fixed; overflow-x: hidden; }
    body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; }
    body::before { width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,255,255,0.55) 0%, transparent 70%); top: -100px; left: -100px; animation: orb1 8s ease-in-out infinite alternate; }
    body::after { width: 400px; height: 400px; background: radial-gradient(circle, rgba(160,230,200,0.45) 0%, transparent 70%); bottom: -80px; right: -80px; animation: orb2 10s ease-in-out infinite alternate; }
    @keyframes orb1 { from { transform: translate(0,0); } to { transform: translate(60px,80px); } }
    @keyframes orb2 { from { transform: translate(0,0); } to { transform: translate(-50px,-60px); } }
    .drops { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .drop { position: absolute; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.7), rgba(160,220,255,0.15)); border: 1px solid rgba(255,255,255,0.5); animation: floatDrop linear infinite; }
    @keyframes floatDrop { 0% { transform: translateY(110vh) scale(0.8) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 0.6; } 100% { transform: translateY(-20vh) scale(1.1) rotate(20deg); opacity: 0; } }

    #lock-screen { position: fixed; inset: 0; z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .lock-card { background: rgba(255,255,255,0.35); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1.5px solid rgba(255,255,255,0.7); border-radius: 24px; padding: 2.5rem; display: flex; flex-direction: column; align-items: center; gap: 1.2rem; box-shadow: 0 8px 40px rgba(100,180,230,0.25), inset 0 1px 0 rgba(255,255,255,0.8); min-width: 280px; }
    .lock-card h1 { font-family: 'Neuropol', sans-serif; font-size: 1.1rem; color: #1a5a7a; letter-spacing: 0.05em; }
    .lock-card input { width: 100%; border: 1.5px solid rgba(255,255,255,0.7); background: rgba(255,255,255,0.5); padding: 0.75rem 1rem; font-size: 1rem; font-family: 'Neuropol', sans-serif; letter-spacing: 0.2em; text-align: center; border-radius: 12px; outline: none; color: #1a4a6a; }
    .lock-card input:focus { border-color: rgba(100,200,240,0.8); }
    .lock-card button { width: 100%; background: linear-gradient(180deg, rgba(120,210,250,0.9) 0%, rgba(60,160,220,0.9) 100%); border: 1px solid rgba(255,255,255,0.6); border-radius: 12px; padding: 0.75rem; font-family: 'Neuropol', sans-serif; font-size: 0.85rem; color: #fff; cursor: pointer; letter-spacing: 0.05em; transition: transform 0.1s; }
    .lock-card button:hover { transform: translateY(-1px); }
    #lock-error { color: #c0392b; font-size: 0.75rem; min-height: 1rem; font-family: 'Neuropol', sans-serif; }

    #app { display: none; position: relative; z-index: 1; }
    header { background: rgba(255,255,255,0.3); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.6); padding: 1.2rem 2rem; display: flex; align-items: center; gap: 1rem; box-shadow: 0 2px 20px rgba(100,180,230,0.15); }
    .back-btn { font-family: 'Neuropol', sans-serif; font-size: 0.72rem; color: #2a8a9a; text-decoration: none; background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.7); padding: 0.35rem 0.8rem; border-radius: 20px; letter-spacing: 0.04em; transition: transform 0.1s; }
    .back-btn:hover { transform: translateY(-1px); }
    header h1 { font-family: 'Neuropol', sans-serif; font-size: 1rem; color: #1a5a7a; letter-spacing: 0.05em; }
    header h1 span { color: #2a9d8f; }

    .container { max-width: 780px; margin: 0 auto; padding: 4rem 1.5rem; text-align: center; }
    .coming { background: rgba(255,255,255,0.38); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1.5px solid rgba(255,255,255,0.75); border-radius: 20px; padding: 4rem 2rem; box-shadow: 0 6px 30px rgba(100,180,230,0.15), inset 0 1px 0 rgba(255,255,255,0.8); }
    .coming .emoji { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
    .coming p { font-family: 'Neuropol', sans-serif; font-size: 0.9rem; color: #2a7a8a; line-height: 1.8; letter-spacing: 0.04em; }
    .coming .sub { font-size: 0.75rem; color: #4a8a9a; margin-top: 0.4rem; }
  </style>
</head>
<body>
<div class="drops" id="drops"></div>

<div id="lock-screen">
  <div class="lock-card">
    <h1>ECON ARCHIVE</h1>
    <input type="password" id="pw-input" placeholder="password" onkeydown="if(event.key==='Enter')checkPw()" />
    <div id="lock-error"></div>
    <button onclick="checkPw()">ENTER</button>
  </div>
</div>

<div id="app">
  <header>
    <a href="index.html" class="back-btn">← HOME</a>
    <h1>📄 <span>NEWS READING</span></h1>
  </header>
  <div class="container">
    <div class="coming">
      <span class="emoji">🌿</span>
      <p>COMING SOON</p>
      <p class="sub">곧 채워질 예정!</p>
    </div>
  </div>
</div>

<script>
  const PW = "econ1234";
  function checkPw() {
    if (document.getElementById('pw-input').value === PW) {
      sessionStorage.setItem('auth', 'ok');
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    } else {
      document.getElementById('lock-error').textContent = 'wrong password';
      document.getElementById('pw-input').value = '';
    }
  }
  if (sessionStorage.getItem('auth') === 'ok') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }
  const drops = document.getElementById('drops');
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div'); d.className = 'drop';
    const size = Math.random() * 28 + 10;
    d.style.cssText = `width:${size}px;height:${size*1.2}px;left:${Math.random()*100}%;animation-duration:${Math.random()*12+10}s;animation-delay:${Math.random()*10}s;`;
    drops.appendChild(d);
  }
</script>
</body>
</html>
