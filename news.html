<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뉴스 읽기 — 수헌의 경제 공부</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #f5f0e8; --paper: #fdfaf4; --ink: #1a1a18; --ink-light: #5a5a52; --accent: #c8401a; --border: #d4ccbc; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--ink); font-family: 'Noto Serif KR', serif; min-height: 100vh; }

    #lock-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; flex-direction: column; gap: 2rem;
    }
    #lock-screen h1 { font-size: 1.4rem; letter-spacing: 0.08em; color: var(--ink-light); font-weight: 400; }
    .lock-box { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }
    #lock-screen input {
      border: 1.5px solid var(--border); background: var(--paper);
      padding: 0.75rem 1.2rem; font-size: 1rem; font-family: 'DM Mono', monospace;
      outline: none; width: 220px; text-align: center; letter-spacing: 0.2em; color: var(--ink); border-radius: 2px;
    }
    #lock-screen input:focus { border-color: var(--accent); }
    #lock-screen button {
      background: var(--accent); color: #fff; border: none;
      padding: 0.65rem 2rem; font-size: 0.9rem; cursor: pointer;
      font-family: 'Noto Serif KR', serif; border-radius: 2px; width: 220px;
    }
    #lock-screen button:hover { background: #a83315; }
    #lock-error { color: var(--accent); font-size: 0.8rem; font-family: 'DM Mono', monospace; min-height: 1rem; }

    #app { display: none; }
    header { border-bottom: 1.5px solid var(--border); padding: 1.2rem 2rem; background: var(--paper); display: flex; align-items: center; gap: 1rem; }
    .back-btn { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--ink-light); text-decoration: none; border: 1px solid var(--border); padding: 0.3rem 0.7rem; border-radius: 2px; }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header h1 span { color: var(--accent); }

    .container { max-width: 780px; margin: 0 auto; padding: 4rem 1.5rem; text-align: center; }
    .coming { border: 1.5px dashed var(--border); padding: 4rem 2rem; }
    .coming p { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--ink-light); line-height: 1.8; }
    .coming .label { font-size: 0.7rem; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.8rem; }
  </style>
</head>
<body>

<div id="lock-screen">
  <h1>🔒 경제 공부 아카이브</h1>
  <div class="lock-box">
    <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()" />
    <div id="lock-error"></div>
    <button onclick="checkPw()">입장</button>
  </div>
</div>

<div id="app">
  <header>
    <a href="index.html" class="back-btn">← 홈</a>
    <h1>📄 <span>뉴스 읽기</span></h1>
  </header>
  <div class="container">
    <div class="coming">
      <p class="label">coming soon</p>
      <p>아직 준비 중이에요.<br>곧 채워질 예정!</p>
    </div>
  </div>
</div>

<script>
  const PW = "econ1234";
  function checkPw() {
    if (document.getElementById('pw-input').value === PW) {
      sessionStorage.setItem('auth', 'ok');
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    } else {
      document.getElementById('lock-error').textContent = '비밀번호가 틀렸어요';
      document.getElementById('pw-input').value = '';
    }
  }
  if (sessionStorage.getItem('auth') === 'ok') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }
</script>
</body>
</html>
